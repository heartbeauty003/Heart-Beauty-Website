<button class="d-md-none mobile-toggle w-100 d-flex justify-content-between align-items-center" (click)="toggleMobile()" type="button">
  <span class="toggle-label">{{ getActiveSectionTitle() }}</span>
  <i class="bi" [ngClass]="isOpen ? 'bi-chevron-up' : 'bi-chevron-down'"></i>
</button>

<nav class="sidebar" [class.show]="isOpen">
  <p class="sidebar-heading d-none d-md-block">Profile Settings</p>
  <ul class="nav-list">
    <li [class.active]="activeSection === 'details'" (click)="selectSection('details')">
      <a href="#" (click)="$event.preventDefault()">User Details</a>
    </li>
    <li [class.active]="activeSection === 'security'" (click)="selectSection('security')">
      <a href="#" (click)="$event.preventDefault()">Security</a>
    </li>
    <li [class.active]="activeSection === 'address'" (click)="selectSection('address')">
      <a href="#" (click)="$event.preventDefault()">Address Book</a>
    </li>
    <li [class.active]="activeSection === 'account'" (click)="selectSection('account')">
      <a href="#" (click)="$event.preventDefault()">Account Management</a>
    </li>
    <li [class.active]="activeSection === 'logout'" (click)="selectSection('logout')" class="logout-item">
      <a href="#" (click)="$event.preventDefault()">
        <i class="bi bi-box-arrow-right me-2"></i>Log Out
      </a>
    </li>
  </ul>
</nav>
