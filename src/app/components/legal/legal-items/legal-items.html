<button class="d-md-none mobile-toggle w-100 d-flex justify-content-between align-items-center" (click)="toggleMobile()">
  <span class="toggle-label">LEGAL TOPICS</span>
  <i class="bi" [ngClass]="isOpen ? 'bi-chevron-up' : 'bi-chevron-down'"></i>
</button>

<nav class="sidebar" [class.show]="isOpen">
  <p class="sidebar-heading d-none d-md-block">LEGAL TOPICS</p>
  <ul class="nav-list">
    <li *ngFor="let item of sidebarItems">
      <a href="#" (click)="scrollToSection(item.id, $event)">{{ item.title }}</a>
    </li>
  </ul>
</nav>
