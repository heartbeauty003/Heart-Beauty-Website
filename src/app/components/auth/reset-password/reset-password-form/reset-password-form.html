<div class="auth-forced-card p-4 p-sm-5 position-relative">
  <button type="button" class="btn-close-auth" (click)="goBackToHome()" aria-label="Close">
    <i class="fa-solid fa-xmark"></i>
  </button>

  <div class="text-center auth-brand-header mb-4">
    <img src="company-logo.png" alt="Heart Beauty" class="auth-business-logo mb-2">
    <h4 class="fw-bold text-dark m-0">Reset Password</h4>
  </div>
  
  <form [formGroup]="resetForm" (ngSubmit)="handleReset()">
    
    <div *ngIf="authStep === 'email'">
      <p class="text-muted small text-center mb-4">Enter your email address and we'll send you a link to reset your password.</p>
      
      <div class="form-floating mb-4 border-bottom">
        <input type="email" formControlName="email" class="form-control border-0 shadow-none px-0" id="resetEmail" placeholder="Email Address">
        <label for="resetEmail" class="px-0 text-muted">Email Address</label>
      </div>

      <div *ngIf="errorMessage" class="auth-error-msg mb-3">
        <i class="fa-solid fa-circle-exclamation me-1"></i> {{ errorMessage }}
      </div>

      <button type="submit" 
              class="btn btn-reset w-100 rounded-pill py-2 d-flex align-items-center justify-content-center" 
              [ngClass]="{'active': resetForm.valid && !isLoading}"
              [disabled]="resetForm.invalid || isLoading">
        
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status"></span>
        <span>{{ isLoading ? 'Sending...' : 'Send Reset Link' }}</span>
      </button>
    </div>

    <div *ngIf="authStep === 'success'" class="text-center py-4">
      <div class="success-icon-circle mb-3">
        <i class="fa-solid fa-envelope-circle-check"></i>
      </div>
      <h5 class="fw-bold text-success">Check your Inbox</h5>
      <p class="text-muted small mb-0">We've sent password reset instructions to <strong>{{ resetForm.value.email }}</strong>.</p>
    </div>

  </form>

  <p class="text-center small text-muted mt-4">
    <a href="javascript:void(0)" (click)="onLoginClick()" class="fw-bold text-decoration-none" style="color: #0b79bf;">Back to Login</a>
  </p>
</div>
