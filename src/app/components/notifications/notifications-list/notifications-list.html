<div *ngIf="isLoading" class="text-center py-5">
  <div class="spinner-border" role="status" style="color: #b85a67;">
    <span class="visually-hidden">Loading...</span>
  </div>
  <p class="mt-3 text-muted">Loading notifications...</p>
</div>

<div *ngIf="!isLoading && notifications.length === 0" class="empty-state text-center py-5">
  <i class="bi bi-bell-slash" style="font-size: 2.5rem; color: #cccccc;"></i>
  <p class="mt-3 text-muted mb-0">No notifications at this time.</p>
</div>

<div *ngIf="!isLoading && notifications.length > 0" class="notifications-list">
  @for (notification of notifications; track notification.id) {
    <div class="notification-card" [ngClass]="getTypeClass(notification.type)">
      <div class="notification-icon">
        <i class="bi" [ngClass]="getTypeIcon(notification.type)"></i>
      </div>
      <div class="notification-body">
        <h5 class="notification-title">{{ notification.title }}</h5>
        <p class="notification-message">{{ notification.message }}</p>
        <span class="notification-date">{{ notification.createdAt | date:'mediumDate' }}</span>
      </div>
    </div>
  }
</div>
